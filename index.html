<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Levy — Self-assessment, sorted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1C2B3A;
    --ink-soft:#4A5A68;
    --paper:#E9EAE2;
    --paper-raised:#F6F5F0;
    --rule:#CBC7B9;
    --green:#2F5D46;
    --green-soft:#DCE7DE;
    --amber:#A9762F;
    --amber-soft:#F1E4C9;
    --red:#A33B2E;
    --red-soft:#F0DAD4;
    --font-display:'Newsreader', serif;
    --font-body:'Public Sans', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  ::selection{background:var(--amber-soft);}
  :focus-visible{outline:2px solid var(--amber); outline-offset:2px;}

  .app{display:flex; min-height:100vh;}

  /* ---------- Sidebar / folder tabs ---------- */
  .sidebar{
    width:196px; flex-shrink:0; background:var(--ink); color:#D8DEE4;
    padding:28px 0 20px; position:relative; z-index:2;
  }
  .brand{padding:0 22px 26px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:14px;}
  .brand .mark{
    font-family:var(--font-display); font-size:1.9rem; font-weight:600; color:#F6F5F0;
    letter-spacing:0.02em; line-height:1;
  }
  .brand .tag{font-size:0.7rem; color:#9AA7B2; margin-top:6px; letter-spacing:0.03em;}
  nav.tabs{display:flex; flex-direction:column; gap:2px;}
  .tab-btn{
    all:unset; cursor:pointer; padding:13px 22px; font-size:0.78rem; font-weight:600;
    text-transform:uppercase; letter-spacing:0.06em; color:#AEB8C1;
    border-left:3px solid transparent; transition:background .15s ease,color .15s ease;
  }
  .tab-btn:hover{color:#F0EFEA; background:rgba(255,255,255,0.04);}
  .tab-btn.active{
    background:var(--paper-raised); color:var(--ink);
    border-radius:0 8px 8px 0; margin-right:-1px; border-left:3px solid var(--amber);
  }
  .tab-btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .tab-btn:disabled:hover{ color:#AEB8C1; background:transparent; }
  .sidebar-foot{padding:18px 22px 0; margin-top:auto; font-size:0.68rem; color:#7C8894; line-height:1.5;}

  /* ---------- Main ---------- */
  main{flex:1; padding:36px 44px 60px; max-width:980px;}
  .topline{display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:28px; flex-wrap:wrap;}
  .topline h1{font-family:var(--font-display); font-size:1.5rem; font-weight:600; margin:0;}
  .topline p{margin:4px 0 0; color:var(--ink-soft); font-size:0.88rem;}

  select, input[type=date], input[type=text], input[type=number]{
    font-family:var(--font-body); font-size:0.85rem; color:var(--ink);
    background:var(--paper-raised); border:1px solid var(--rule); border-radius:6px;
    padding:9px 12px;
  }
  select{cursor:pointer;}
  label{font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); display:block; margin-bottom:5px; font-weight:600;}
  .field{margin-bottom:16px;}

  button.btn{
    font-family:var(--font-body); font-weight:600; font-size:0.82rem; cursor:pointer;
    border:1px solid var(--ink); background:var(--ink); color:var(--paper-raised);
    padding:10px 18px; border-radius:6px; transition:opacity .15s ease;
  }
  button.btn:hover{opacity:0.85;}
  button.btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--rule);}
  button.btn.danger{background:var(--red); border-color:var(--red);}
  button.btn.small{padding:6px 12px; font-size:0.72rem;}

  /* ---------- Cards / ledger sheets ---------- */
  .sheet{
    background:var(--paper-raised); border:1px solid var(--rule); border-radius:10px;
    padding:22px 24px; margin-bottom:20px;
  }
  .sheet h2{font-family:var(--font-display); font-size:1.05rem; font-weight:600; margin:0 0 4px;}
  .sheet .sub{font-size:0.8rem; color:var(--ink-soft); margin:0 0 16px;}
  .grid-2{display:grid; grid-template-columns:1.1fr 0.9fr; gap:20px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
  @media (max-width:820px){ .grid-2, .grid-3{grid-template-columns:1fr;} }

  .big-number{font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:2.6rem; font-weight:600; line-height:1;}
  .small-label{font-size:0.72rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); font-weight:600;}
  .mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums;}

  /* ---------- Stamp ---------- */
  .stamp{
    display:inline-block; position:relative; border:2px solid var(--c,var(--ink));
    color:var(--c,var(--ink)); padding:6px 14px; border-radius:5px; transform:rotate(-3deg);
    font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.08em;
    font-size:0.72rem; font-weight:600; background:transparent;
  }
  .stamp::after{
    content:''; position:absolute; inset:3px; border:1px solid var(--c,var(--ink)); border-radius:3px; opacity:0.5;
  }
  .stamp.red{--c:var(--red);}
  .stamp.amber{--c:var(--amber);}
  .stamp.green{--c:var(--green);}
  .stamp.ink{--c:var(--ink-soft);}

  table{width:100%; border-collapse:collapse; font-size:0.84rem;}
  thead th{
    text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--ink-soft); border-bottom:1px solid var(--ink); padding:0 8px 8px;
  }
  tbody td{padding:10px 8px; border-bottom:1px solid var(--rule); vertical-align:middle;}
  tbody tr:hover{background:rgba(0,0,0,0.02);}
  .amt-income{color:var(--green); font-family:var(--font-mono);}
  .amt-expense{color:var(--red); font-family:var(--font-mono);}
  .empty-row{padding:30px 8px; text-align:center; color:var(--ink-soft); font-size:0.85rem;}

  .deadline.overdue{border-color:var(--red); background:var(--red-soft);}
  .deadline.today{border-color:var(--amber); background:var(--amber-soft);}
  .deadline.soon{border-color:var(--amber);}
  .deadline .dd-label{font-weight:600; font-size:0.9rem;}
  .deadline .dd-date{font-size:0.78rem; color:var(--ink-soft); font-family:var(--font-mono);}
  .deadline .dd-right{display:flex; align-items:center; gap:12px;}

  .badge-days{font-family:var(--font-mono); font-size:0.72rem; padding:3px 8px; border-radius:20px; background:var(--ink); color:var(--paper-raised);}

  /* ---------- Donut ---------- */
  .donut-wrap{display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
  .legend-item{display:flex; align-items:center; gap:8px; font-size:0.8rem; margin-bottom:6px;}
  .legend-dot{width:10px; height:10px; border-radius:2px; flex-shrink:0;}

  /* ---------- Upload dropzone ---------- */
  .dropzone{
    border:1.5px dashed var(--rule); border-radius:10px; padding:26px; text-align:center;

  .dropzone strong{color:var(--ink);}

  .divider{height:1px; background:var(--rule); margin:20px 0;}
  .disclaimer{font-size:0.72rem; color:var(--ink-soft); line-height:1.6; margin-top:8px;}

  a{color:var(--green); text-decoration:underline; text-decoration-color:var(--rule);}
  a:hover{text-decoration-color:var(--green);}

  .wg-phase-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:4px;}
  .wg-step{display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--rule);}
  .wg-step:last-child{border-bottom:none;}
  .wg-step input[type=checkbox]{margin-top:3px; width:auto; flex-shrink:0; cursor:pointer;}
  .wg-step .wg-step-text{flex:1; font-size:0.87rem; line-height:1.5;}
  .wg-step .wg-step-text.done{text-decoration:line-through; color:var(--ink-soft);}
  .wg-step .wg-link{margin-left:8px; font-size:0.76rem; white-space:nowrap;}
  .wg-note{background:var(--amber-soft); border:1px solid var(--amber); border-radius:6px; padding:10px 12px; margin-bottom:14px; font-size:0.78rem; line-height:1.6; color:var(--ink);}

  .chat-messages{display:flex; flex-direction:column; gap:12px; max-height:460px; overflow-y:auto; padding:4px 2px 10px; margin-bottom:14px;}
  .chat-bubble{max-width:80%; padding:12px 14px; border-radius:10px; font-size:0.86rem; line-height:1.55;}
  .chat-bubble.user{align-self:flex-end; background:var(--ink); color:var(--paper-raised); border-bottom-right-radius:2px;}
  .chat-bubble.assistant{align-self:flex-start; background:var(--paper); border:1px solid var(--rule); border-bottom-left-radius:2px;}
  .chat-tag{font-family:var(--font-mono); font-size:0.65rem; color:var(--green); margin-top:6px; text-transform:uppercase; letter-spacing:0.05em;}
  .chat-thinking{display:flex; gap:4px; align-items:center; padding:14px;}
  .chat-thinking span{width:6px; height:6px; border-radius:50%; background:var(--ink-soft); opacity:0.4; animation:chatPulse 1.1s infinite ease-in-out;}
  .chat-thinking span:nth-child(2){animation-delay:.15s;}
  .chat-thinking span:nth-child(3){animation-delay:.3s;}
  @keyframes chatPulse{ 0%,80%,100%{opacity:.25; transform:scale(0.85);} 40%{opacity:1; transform:scale(1);} }
  .chat-input-row{display:flex; gap:10px;}
  .chat-empty{text-align:center; padding:20px 10px;}
  .chat-suggestions{display:flex; flex-wrap:wrap; gap:8px; justify-content:center;}
  .chip{all:unset; cursor:pointer; font-size:0.78rem; padding:8px 14px; border:1px solid var(--rule); border-radius:20px; background:var(--paper-raised); color:var(--ink); transition:border-color .15s ease;}
  .chip:hover{border-color:var(--ink);}
  .toast{
    position:fixed; bottom:24px; right:24px; background:var(--ink); color:var(--paper-raised);
    padding:12px 18px; border-radius:8px; font-size:0.82rem; opacity:0; transform:translateY(8px);
    transition:opacity .25s ease, transform .25s ease; pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1; transform:translateY(0);}

  @media (max-width:720px){
    .app{flex-direction:column;}
    .sidebar{width:100%; padding:16px 0; display:flex; flex-direction:column;}
    .brand{border-bottom:none; padding-bottom:12px;}
    nav.tabs{flex-direction:row; overflow-x:auto; padding:0 12px; gap:4px;}
    .tab-btn{white-space:nowrap; border-left:none; border-bottom:3px solid transparent; border-radius:0;}
    .tab-btn.active{border-radius:6px 6px 0 0; margin-right:0; border-left:none; border-bottom:3px solid var(--amber);}
    .sidebar-foot{display:none;}
    main{padding:24px 18px 50px;}
    .big-number{font-size:2rem;}
  }
</style>

const store = {
  async get(key){
    const { data, error } = await sb.from('kv').select('value').eq('key', key).maybeSingle();
    if (error) throw error;
    if (!data) throw new Error('not found: ' + key);   // preserves get-throws-on-missing semantics
    return { key, value: data.value };
  },
  async set(key, value){
    const { error } = await sb.from('kv').upsert({ key, value }, { onConflict: 'user_id,key' });
    if (error) throw error;
    return { key, value };
  },
  async delete(key){
    const { error } = await sb.from('kv').delete().eq('key', key);
    if (error) throw error;
    return { key, deleted: true };
  },
  async list(prefix){
    const { data, error } = await sb.from('kv').select('key').like('key', (prefix || '') + '%');
    if (error) throw error;
    return { keys: data.map(r => r.key), prefix };
  }
};

const ASK_SYSTEM_PROMPT = `You are "Ask Levy", a narrow tax-concepts assistant inside Levy, an app for UK self-employed sole traders.

Your ONLY job: explain general UK self-employment tax concepts, terms, and rules in plain English.

/* ---------------- Tax calculation ---------------- */
function computeTax(profit, taxYearKey, includeClass2){
  const d = TAX_DATA[taxYearKey];
  profit = Math.max(0, profit);
  let pa = d.pa;
  if (profit > 100000) pa = Math.max(0, d.pa - Math.floor((profit - 100000) / 2));
  const taxable = Math.max(0, profit - pa);
  const b1 = Math.min(taxable, d.basicBand);          const t20 = b1 * 0.20;
  const rem1 = taxable - b1;
  const b2 = Math.min(rem1, d.higherBand);             const t40 = b2 * 0.40;
  const rem2 = rem1 - b2;                              const t45 = rem2 * 0.45;
  const incomeTax = t20 + t40 + t45;

  const c4main = Math.max(0, Math.min(profit, d.class4UPL) - d.class4LPL) * 0.06;
  const c4upper = Math.max(0, profit - d.class4UPL) * 0.02;
  const class4 = c4main + c4upper;

  const class2Due = includeClass2 && profit < d.class2SPT ? d.class2Weekly * 52 : 0;

  const total = incomeTax + class4 + class2Due;
  const poaEach = total > 1000 ? total / 2 : 0;

  return { pa, taxable, t20, t40, t45, incomeTax, c4main, c4upper, class4, class2Due, total, poaEach };
}

/* ---------------- Election calculators ---------------- */
function clampPercent(x){ return Math.min(100, Math.max(0, Number(x) || 0)); }

function computeMileageDeduction(miles, taxYearKey){
  miles = Math.max(0, Number(miles) || 0);
  const d = TAX_DATA[taxYearKey];
  return Math.min(miles, 10000) * d.mileageFirst + Math.max(0, miles - 10000) * d.mileageAfter;
}

function computeHomeFlatRate(hoursPerMonth, monthsWorked){
  const hours = Math.max(0, Number(hoursPerMonth) || 0);
  const months = Math.min(12, Math.max(0, Number(monthsWorked) || 0));
  const band = HOME_FLAT_BANDS.find(b => hours >= b.minHours);
  if (!band) return 0;
  return band.monthly * months;
}

function compareVehicle(v, taxYearKey){
  const simplified = computeMileageDeduction(v.businessMiles, taxYearKey);
  const actual = Math.max(0, v.actualAnnualCosts) * clampPercent(v.businessUsePercent) / 100;
  const winner = simplified > actual ? 'simplified' : actual > simplified ? 'actual' : 'tie';
  return { simplified, actual, winner, delta: Math.abs(simplified - actual) };
}

function compareHome(h){
  const simplified = computeHomeFlatRate(h.hoursPerMonth, h.monthsWorked);
  const actual = Math.max(0, h.annualHouseholdCosts) * clampPercent(h.businessProportionPercent) / 100;
  const eligible = Number(h.hoursPerMonth) >= 25;
  const winner = !eligible ? 'actual' : (simplified > actual ? 'simplified' : actual > simplified ? 'actual' : 'tie');
  return { simplified, actual, eligible, winner, delta: Math.abs(simplified - actual) };
}

function compareTradingAllowance(t, taxYearKey){
  const gross = Math.max(0, Number(t.grossIncome) || 0);
  const expenses = Math.max(0, Number(t.totalExpenses) || 0);
  const d = TAX_DATA[taxYearKey];
  const profitTA = Math.max(0, gross - Math.min(d.tradingAllowance, gross));
  const profitExp = Math.max(0, gross - expenses);
  const taxTA = computeTax(profitTA, taxYearKey, false);
  const taxExp = computeTax(profitExp, taxYearKey, false);
  const lossWarning = expenses > gross;

  let winner;
  if (taxTA.total < taxExp.total) winner = 'ta';
  else if (taxExp.total < taxTA.total) winner = 'expenses';
  else if (profitTA < profitExp) winner = 'ta';
  else if (profitExp < profitTA) winner = 'expenses';
  else winner = 'tie';

  return { profitTA, profitExp, taxTA, taxExp, winner, delta: Math.abs(taxTA.total - taxExp.total), lossWarning };
}

/* ---------------- Return Guide (walkthrough) helpers ---------------- */
function getWalkthroughContext(){
  const isFirstTime = !(state.settings.utr && state.settings.utr.trim());
  const phases = WALKTHROUGH_PHASES.filter(p => !p.firstTimeOnly || isFirstTime);
  const rawTotal = phases.reduce((a,p)=>a+p.weight,0);
  return { isFirstTime, phases, rawTotal };
}

function computeWalkthroughProgress(){
  const { phases, rawTotal } = getWalkthroughContext();
  let overall = 0, totalSteps = 0, doneSteps = 0;
  const phaseStats = phases.map(p=>{
    const total = p.steps.length;
    const done = p.steps.filter(s => state.walkthroughDone.includes(s.id)).length;
    totalSteps += total; doneSteps += done;
    const effectiveWeight = rawTotal ? (p.weight / rawTotal * 100) : 0;
    const pct = total ? done / total : 0;
    overall += effectiveWeight * pct;
    return { phase:p, total, done, effectiveWeight, pct };
  });
  return { overall, totalSteps, doneSteps, phaseStats };
}

/* ---------------- Deadlines engine ---------------- */
function buildDeadlines(){
  const today = new Date(); today.setHours(0,0,0,0);
  const anchor = new Date(state.settings.taxYearEnd);
  const md = { month: anchor.getMonth(), day: anchor.getDate() };

  let cycle0 = new Date(today.getFullYear(), md.month, md.day);
  if (cycle0 > today) cycle0 = addYears(cycle0, -1);

  const cycles = [addYears(cycle0,-1), cycle0, addYears(cycle0,1)];
  let events = [];
  cycles.forEach(ye=>{
    const y = ye.getFullYear();
    events.push({ id:`filing-${y}`, date:new Date(y+1,0,31), label:'File return & pay balance (+ 1st payment on account)', type:'filing' });
    events.push({ id:`poa2-${y}`, date:new Date(y+1,6,31), label:'2nd payment on account due', type:'poa' });
    [3,6,9].forEach((m,i)=>{
      events.push({ id:`q${i+1}-${y}`, date: addMonths(ye,m), label:`Quarterly check-in: update income & expenses`, type:'quarterly' });
    });
    events.push({ id:`yearend-${y}`, date: addYears(ye,1), label:'Tax year ends — gather final records', type:'yearend' });
  });

  const seen = new Set();
  events = events.filter(e => seen.has(e.id) ? false : (seen.add(e.id), true));

  events.forEach(e=>{
    const days = Math.round((e.date - today) / 86400000);
    e.days = days;
    e.done = state.deadlinesDone.includes(e.id);
    if (e.done) e.status = 'done';
    else if (days < 0) e.status = 'overdue';
    else if (days === 0) e.status = 'today';
    else if (days <= 30) e.status = 'soon';
    else e.status = 'later';
  });

  events = events.filter(e => !(e.done && e.days < -60) && e.days < 420);
  events.sort((a,b)=> a.date - b.date);
  return events;
}

function stampClassFor(status){
  return { overdue:'red', today:'red', soon:'amber', later:'ink', done:'green' }[status] || 'ink';
}
function stampTextFor(e){
  if (e.status==='done') return 'DONE';
  if (e.status==='overdue') return `${Math.abs(e.days)}D OVERDUE`;
  if (e.status==='today') return 'DUE TODAY';
  return `${e.days}D`;
}

/* ---------------- Donut SVG ---------------- */
function donutSVG(segments, size=150, stroke=20){
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const total = segments.reduce((a,s)=>a+s.value,0) || 1;
  let offset = 0;
  const circles = segments.map(s=>{
    const frac = s.value / total;
    const dash = frac * c;
    const el = `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}"
      stroke-dasharray="${dash} ${c-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${size/2} ${size/2})" stroke-linecap="butt"/>`;
    offset += dash;
    return el;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--rule)" stroke-width="${stroke}"/>
    ${circles}
  </svg>`;
}

          <input type="checkbox" id="c-class2" ${c.class2?'checked':''} style="width:auto;">
          <label style="margin:0;" for="c-class2">Include voluntary Class 2 NI (protects your State Pension record if profit is under ${gbp(d.class2SPT)})</label>
        </div>
        <button class="btn ghost" id="useLoggedBtn" type="button" style="margin-top:6px;">Use logged income &amp; expenses for this year</button>
      </div>

      <div class="sheet">
        <h2>Estimated bill</h2>
        <div class="big-number">${gbp(tax.total)}</div>
        <p class="sub" style="margin-top:6px;">on ${gbp(profit)} profit</p>
        <div class="divider"></div>
        <table>
          <tbody>
            <tr><td>Personal Allowance used</td><td class="mono" style="text-align:right;">${gbp(tax.pa)}</td></tr>
            <tr><td>Taxable profit</td><td class="mono" style="text-align:right;">${gbp(tax.taxable)}</td></tr>
            <tr><td>Basic rate (20%)</td><td class="mono" style="text-align:right;">${gbp(tax.t20)}</td></tr>
            <tr><td>Higher rate (40%)</td><td class="mono" style="text-align:right;">${gbp(tax.t40)}</td></tr>
            <tr><td>Additional rate (45%)</td><td class="mono" style="text-align:right;">${gbp(tax.t45)}</td></tr>
            <tr><td><strong>Income Tax</strong></td><td class="mono" style="text-align:right;"><strong>${gbp(tax.incomeTax)}</strong></td></tr>
            <tr><td>Class 4 NI (6%)</td><td class="mono" style="text-align:right;">${gbp(tax.c4main)}</td></tr>
            <tr><td>Class 4 NI (2% above ${gbp(d.class4UPL)})</td><td class="mono" style="text-align:right;">${gbp(tax.c4upper)}</td></tr>
            ${ c.class2 ? `<tr><td>Voluntary Class 2 NI</td><td class="mono" style="text-align:right;">${gbp(tax.class2Due)}</td></tr>` : '' }
          </tbody>
        </table>
      </div>
    </div>

    <div class="sheet">
      <h2>Payments on account</h2>
      <p class="sub">If your bill is over £1,000, HMRC usually asks for it in two advance instalments toward next year.</p>
      ${ tax.poaEach > 0 ? `
        <div class="grid-2">
          <div><div class="small-label">1st payment — due 31 Jan</div><div class="mono" style="font-size:1.2rem;">${gbp(tax.poaEach)}</div></div>
          <div><div class="small-label">2nd payment — due 31 Jul</div><div class="mono" style="font-size:1.2rem;">${gbp(tax.poaEach)}</div></div>
        </div>
      ` : `<p style="color:var(--ink-soft); font-size:0.85rem;">Not applicable — your estimated bill is under £1,000.</p>` }
      <p class="disclaimer">This is a simplified estimate. Actual payments on account are based on your previous year's return and can be reduced via form SA303 — confirm with HMRC or your accountant.</p>
    </div>

    <div class="sheet">
      <h2>Vehicle costs — flat-rate mileage vs actual costs</h2>
      <p class="sub">Compare simplified mileage against your actual running costs for ${d.label}.</p>
      <div class="grid-3">
        <div class="field"><label>Business miles driven</label><input type="number" id="e-v-miles" value="${el.vehicle.businessMiles}" min="0" max="200000" step="1" style="width:100%;"></div>
        <div class="field"><label>Actual annual vehicle costs (£)</label><input type="number" id="e-v-costs" value="${el.vehicle.actualAnnualCosts}" min="0" step="0.01" style="width:100%;"></div>
        <div class="field"><label>Business use (%)</label><input type="number" id="e-v-percent" value="${el.vehicle.businessUsePercent}" min="0" max="100" step="1" style="width:100%;"></div>
      </div>
      <div class="grid-2">
        <div>
          <div class="small-label">Simplified mileage</div>
          <div class="mono" style="font-size:1.2rem; margin-top:4px;">${gbp(vc.simplified)}</div>
          ${ vc.winner==='simplified' ? `<span class="stamp green" style="margin-top:8px; display:inline-block;">SAVES ${gbp(vc.delta)}/YR</span>` : '' }
        </div>
        <div>
          <div class="small-label">Actual costs</div>
          <div class="mono" style="font-size:1.2rem; margin-top:4px;">${gbp(vc.actual)}</div>
          ${ vc.winner==='actual' ? `<span class="stamp green" style="margin-top:8px; display:inline-block;">SAVES ${gbp(vc.delta)}/YR</span>` : '' }
        </div>
      </div>
      ${ vc.winner==='tie' ? `<div style="margin-top:10px;"><span class="stamp amber">EITHER WORKS</span></div>` : '' }
      <p class="disclaimer">Once you use the flat-rate mileage method for a vehicle, you must keep using it for as long as that vehicle is in your business — and you can't claim capital allowances on it. The actual-costs figure here covers running costs only (fuel, insurance, servicing, repairs); it doesn't model tax relief on the vehicle's purchase price, which can favour the actual method for newer or more expensive vehicles — worth an accountant's view in that case. Rates shown are for the selected tax year; the 2026/27 rate rose to 55p/mile in May 2026 and is under review at Budget 2026.</p>
    </div>

    <div class="sheet">
      <h2>Working from home — flat rate vs actual costs</h2>
      <p class="sub">Compare the simplified flat rate against your actual household running costs.</p>
      <div class="grid-2">
        <div class="field"><label>Hours worked from home per month</label><input type="number" id="e-h-hours" value="${el.home.hoursPerMonth}" min="0" max="500" step="1" style="width:100%;"></div>
        <div class="field"><label>Months worked this year</label><input type="number" id="e-h-months" value="${el.home.monthsWorked}" min="0" max="12" step="1" style="width:100%;"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label>Annual household running costs (£)</label><input type="number" id="e-h-costs" value="${el.home.annualHouseholdCosts}" min="0" max="1000000" step="0.01" style="width:100%;"></div>
        <div class="field"><label>Business use of home (%)</label><input type="number" id="e-h-percent" value="${el.home.businessProportionPercent}" min="0" max="100" step="1" style="width:100%;"></div>
      </div>
      <div class="grid-2">
        <div>
          <div class="small-label">Flat rate</div>
          <div class="mono" style="font-size:1.2rem; margin-top:4px;">${gbp(hc.simplified)}</div>
          ${ !hc.eligible ? `<span class="stamp amber" style="margin-top:8px; display:inline-block;">NOT ELIGIBLE</span>` : '' }
          ${ hc.eligible && hc.winner==='simplified' ? `<span class="stamp green" style="margin-top:8px; display:inline-block;">SAVES ${gbp(hc.delta)}/YR</span>` : '' }
        </div>
        <div>
          <div class="small-label">Actual costs</div>
          <div class="mono" style="font-size:1.2rem; margin-top:4px;">${gbp(hc.actual)}</div>
          ${ hc.winner==='actual' ? `<span class="stamp green" style="margin-top:8px; display:inline-block;">SAVES ${gbp(hc.delta)}/YR</span>` : '' }
        </div>
      </div>
      ${ hc.eligible && hc.winner==='tie' ? `<div style="margin-top:10px;"><span class="stamp amber">EITHER WORKS</span></div>` : '' }
      <p class="disclaimer">The flat rate needs at least 25 hours of business use at home per month. It also excludes phone and internet — claim the business share of those separately either way. This comparison uses one typical month × months worked; HMRC lets you vary the band month by month if your hours change a lot.</p>
    </div>

    <div class="sheet">
      <h2>Trading allowance vs claiming expenses</h2>
      <p class="sub">Compare the £1,000 trading allowance against claiming your actual allowable expenses, for ${d.label}.</p>
      <button class="btn ghost" id="ta-prefill" type="button" style="margin-bottom:14px;">Use logged figures for this year</button>
      <div class="grid-2">
        <div class="field"><label>Gross trading income (£)</label><input type="number" id="e-t-gross" value="${el.ta.grossIncome}" min="0" max="10000000" step="0.01" style="width:100%;"></div>
        <div class="field"><label>Total allowable expenses (£)</label><input type="number" id="e-t-expenses" value="${el.ta.totalExpenses}" min="0" max="10000000" step="0.01" style="width:100%;"></div>
      </div>
      <div class="grid-2">
        <div>
          <div class="small-label">Claim the £1,000 allowance</div>
          <div style="margin:8px 0 2px;">Taxable profit: <span class="mono">${gbp(tac.profitTA)}</span></div>
          <div>Estimated tax: <span class="mono">${gbp(tac.taxTA.total)}</span></div>
          ${ tac.winner==='ta' ? `<span class="stamp green" style="margin-top:8px; display:inline-block;">SAVES ${gbp(tac.delta)}/YR</span>` : '' }
        </div>
        <div>
          <div class="small-label">Claim your expenses</div>
          <div style="margin:8px 0 2px;">Taxable profit: <span class="mono">${gbp(tac.profitExp)}</span></div>
          <div>Estimated tax: <span class="mono">${gbp(tac.taxExp.total)}</span></div>
          ${ tac.winner==='expenses' ? `<span class="stamp green" style="margin-top:8px; display:inline-block;">SAVES ${gbp(tac.delta)}/YR</span>` : '' }
          ${ tac.lossWarning ? `<span class="stamp amber" style="margin-top:8px; margin-left:8px; display:inline-block;">LOSS — SEE NOTE</span>` : '' }
        </div>
      </div>
      ${ tac.winner==='tie' ? `<div style="margin-top:10px;"><span class="stamp amber">EITHER WORKS</span></div>` : '' }
      <p class="disclaimer">The £1,000 allowance is measured against gross income, before expenses, across all your trades combined. Claiming it means claiming nothing else — no expenses, no capital allowances — and it can't create a loss. If your expenses are bigger than your income, claiming actual expenses creates a loss that can reduce other tax — Levy doesn't model loss relief, so that's a genuine reason to talk to an accountant.</p>
    </div>

    <div class="sheet">
      <h2>Two decisions you <em>don't</em> need a calculator for</h2>
      <p><strong>Cash basis vs traditional accounting.</strong> Since April 2024 the cash basis — counting income when it's received and expenses when they're paid — is the default for sole traders, with no turnover limit, and losses now work the same as under traditional accounting. Most people should simply stay on it. Consider electing traditional (accruals) accounting only if you hold significant stock or work-in-progress, or need accruals-based accounts for a lender — and if that's you, that decision is worth a qualified accountant, not a calculator.</p>
      <p><strong>Equipment purchases.</strong> Under the cash basis, most equipment simply counts as an expense when you pay for it — no separate capital-allowances claim needed (cars are the main exception; see the mileage comparison above). If you've elected traditional accounting, the Annual Investment Allowance usually gives full relief in the year of purchase anyway. The one subtle case — deliberately claiming less in a low-profit year so allowances aren't wasted against income that's already tax-free — is real but niche, and a good question for an accountant.</p>
    </div>

    <div class="sheet">
      <p class="disclaimer">These comparisons are estimates on the figures you enter, using standard HMRC rates for the selected year. They don't file anything and aren't advice — confirm with HMRC or a qualified accountant before relying on them.</p>
    </div>
  `;
}

/* ---------------- Event handlers ---------------- */
function attachHandlers(){
  // Auth gate
  const authForm = document.getElementById('authForm');
  if (authForm){
    authForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const submitBtn = authForm.querySelector('button[type=submit]');
      submitBtn.disabled = true;
      try{
        const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin } });
        if (error) throw error;
        authForm.outerHTML = '<p style="font-size:0.9rem;">Check your email — the link signs you in on this device.</p>';
      }catch(err){
        showToast(err.message || "Couldn't send the sign-in link — try again");
        submitBtn.disabled = false;
      }
    });
  }

  // Income tab
  const typeSel = document.getElementById('f-type');
  const catSel = document.getElementById('f-category');
  if (typeSel && catSel){
    const fillCats = () => {
      const opts = typeSel.value==='income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
      catSel.innerHTML = opts.map(o=>`<option value="${o}">${o}</option>`).join('');
    };
    fillCats();
    typeSel.addEventListener('change', fillCats);
  }

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileNameEl = document.getElementById('fileName');
  let attachedFileName = '';
  if (dropzone && fileInput){
    dropzone.addEventListener('click', ()=> fileInput.click());
    fileInput.addEventListener('change', ()=>{
      if (fileInput.files[0]){ attachedFileName = fileInput.files[0].name; fileNameEl.textContent = `Attached: ${attachedFileName}`; }
    });
    ['dragover','dragenter'].forEach(ev=> dropzone.addEventListener(ev, e=>{ e.preventDefault(); dropzone.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev=> dropzone.addEventListener(ev, e=>{ e.preventDefault(); dropzone.classList.remove('drag'); }));
    dropzone.addEventListener('drop', e=>{
      if (e.dataTransfer.files[0]){ attachedFileName = e.dataTransfer.files[0].name; fileNameEl.textContent = `Attached: ${attachedFileName}`; }
    });
  }

  const entryForm = document.getElementById('entryForm');
  if (entryForm){
    entryForm.addEventListener('submit', async e=>{
      e.preventDefault();
      const entry = {
        id: uid(),
        date: document.getElementById('f-date').value,
        type: document.getElementById('f-type').value,
        category: document.getElementById('f-category').value,
        description: document.getElementById('f-desc').value,
        amount: Number(document.getElementById('f-amount').value || 0),
        fileName: attachedFileName || null
      };
      state.entries.push(entry);
      await saveEntries();
      attachedFileName = '';
      showToast('Entry added');
      render();
    });
  }

  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      state.entries = state.entries.filter(e=> e.id !== btn.dataset.del);
      await saveEntries();
      showToast('Entry removed');
      render();
    });
  });

  // Calculator tab
  const cYear = document.getElementById('c-year');
  const cIncome = document.getElementById('c-income');
  const cExpenses = document.getElementById('c-expenses');
  const cClass2 = document.getElementById('c-class2');
  const useLoggedBtn = document.getElementById('useLoggedBtn');
  if (cYear){
    const commit = async ()=>{
      state.calc = {
        taxYear: cYear.value,
        income: Number(cIncome.value||0),
        expenses: Number(cExpenses.value||0),
        class2: cClass2.checked
      };
      await saveCalc();
      render();
    };
    cYear.addEventListener('change', commit);
    cIncome.addEventListener('change', commit);
    cExpenses.addEventListener('change', commit);
    cClass2.addEventListener('change', commit);
    useLoggedBtn.addEventListener('click', async ()=>{
      const d = TAX_DATA[cYear.value];
      const list = entriesInRange(d.start, d.end);
      state.calc.income = sumByType(list,'income');
      state.calc.expenses = sumByType(list,'expense');
      state.calc.taxYear = cYear.value;
      await saveCalc();
      showToast('Pulled from your logged entries');
      render();
    });
  }

  // Election calculators
  const eVMiles = document.getElementById('e-v-miles');
  const eVCosts = document.getElementById('e-v-costs');
  const eVPercent = document.getElementById('e-v-percent');
  const eHHours = document.getElementById('e-h-hours');
  const eHMonths = document.getElementById('e-h-months');
  const eHCosts = document.getElementById('e-h-costs');
  const eHPercent = document.getElementById('e-h-percent');
  const eTGross = document.getElementById('e-t-gross');
  const eTExpenses = document.getElementById('e-t-expenses');
  const taPrefillBtn = document.getElementById('ta-prefill');
  if (eVMiles){
    const commitElections = async ()=>{
      state.elections = {
        vehicle: {
          businessMiles: Number(eVMiles.value||0),
          actualAnnualCosts: Number(eVCosts.value||0),
          businessUsePercent: Number(eVPercent.value||0)
        },
        home: {
          hoursPerMonth: Number(eHHours.value||0),
          monthsWorked: Number(eHMonths.value||0),
          annualHouseholdCosts: Number(eHCosts.value||0),
          businessProportionPercent: Number(eHPercent.value||0)
        },
        ta: {
          grossIncome: Number(eTGross.value||0),
          totalExpenses: Number(eTExpenses.value||0)
        }
      };
      await saveElections();
      render();
    };
    [eVMiles, eVCosts, eVPercent, eHHours, eHMonths, eHCosts, eHPercent, eTGross, eTExpenses].forEach(input=>{
      input.addEventListener('change', commitElections);
    });
  }
  if (taPrefillBtn){
    taPrefillBtn.addEventListener('click', async ()=>{
      const d = TAX_DATA[cYear.value];
      const list = entriesInRange(d.start, d.end);
      state.elections.ta.grossIncome = sumByType(list,'income');
      state.elections.ta.totalExpenses = sumByType(list,'expense');
      await saveElections();
      showToast('Pulled from your logged entries');
      render();
    });
  }

  // Ask Levy tab
  const chatForm = document.getElementById('chatForm');
  if (chatForm){
    const chatInput = document.getElementById('chatInput');
    chatForm.addEventListener('submit', e=>{
      e.preventDefault();
      const val = chatInput.value;
      chatInput.value = '';
      sendChatMessage(val);
    });
    document.querySelectorAll('[data-suggest]').forEach(btn=>{
      btn.addEventListener('click', ()=> sendChatMessage(btn.dataset.suggest));
    });
    const clearChatBtn = document.getElementById('clearChatBtn');
    if (clearChatBtn){
      clearChatBtn.addEventListener('click', async ()=>{
        state.chat = [];
        await saveChat();
        render();
      });
    }
  }
  const chatMessagesEl = document.getElementById('chatMessages');
  if (chatMessagesEl) chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;

  // Return Guide tab
  document.querySelectorAll('[data-wg-step]').forEach(cb=>{
    cb.addEventListener('change', async ()=>{
      const id = cb.dataset.wgStep;
      if (cb.checked){ if(!state.walkthroughDone.includes(id)) state.walkthroughDone.push(id); }
      else { state.walkthroughDone = state.walkthroughDone.filter(x=>x!==id); }
      await saveWalkthrough();
      render();
    });
  });
  const wgResetBtn = document.getElementById('wgResetBtn');
  if (wgResetBtn){
    wgResetBtn.addEventListener('click', async ()=>{
      if (!confirm('This clears all Return Guide progress. Continue?')) return;
      state.walkthroughDone = [];
      await saveWalkthrough();
      showToast('Return Guide progress reset');
      render();
    });
  }

  // Deadlines tab
  document.querySelectorAll('[data-toggle]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.toggle;
      if (state.deadlinesDone.includes(id)) state.deadlinesDone = state.deadlinesDone.filter(x=>x!==id);
      else state.deadlinesDone.push(id);
      await saveDeadlinesDone();
      render();
    });
  });

  // Settings tab
  const signOutBtn = document.getElementById('signOutBtn');
  if (signOutBtn){
    signOutBtn.addEventListener('click', async ()=>{
      await sb.auth.signOut();
      // state clearing and re-render happen via onAuthStateChange
    });
  }
  const saveBtn = document.getElementById('saveSettingsBtn');
  if (saveBtn){
    saveBtn.addEventListener('click', async ()=>{
      state.settings.taxYearEnd = document.getElementById('s-taxyearend').value;
      state.settings.utr = document.getElementById('s-utr').value;
      await saveSettings();
      showToast('Settings saved');
      render();
    });
  }
  const resetBtn = document.getElementById('resetBtn');
  if (resetBtn){
    resetBtn.addEventListener('click', async ()=>{
      if (!confirm('This clears all Levy data on this device. Continue?')) return;
      state = freshState('settings');
      await saveSettings(); await saveEntries(); await saveDeadlinesDone(); await saveCalc(); await saveElections(); await saveChat(); await saveWalkthrough();
      showToast('All data reset');
      render();
    });
  }
}

/* ---------------- Init ---------------- */
(async function init(){
  document.querySelectorAll('.tab-btn').forEach(b=> b.addEventListener('click', ()=> setTab(b.dataset.tab)));

  const { data: { session } } = await sb.auth.getSession();
  currentUser = session ? session.user : null;

  sb.auth.onAuthStateChange(async (_event, session) => {
    const was = !!currentUser; currentUser = session ? session.user : null;
    if (!was && currentUser){ await loadState(); setTab('dashboard'); }
    if (was && !currentUser){ resetInMemoryState(); render(); }
  });

  if (currentUser){ await loadState(); }
  setTab('dashboard'); // renders gate or app depending on currentUser
})();
</script>
</body>
</html>
